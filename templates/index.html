<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制面板</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body>
    <div class="container">
        <h1>控制面板</h1>

        <div class="grid">
            <!-- 电阻控制 -->
            <div class="card">
                <h2>电阻控制 <span id="res-title-status"></span></h2>

                <!-- 串口连接和添加设备 -->
                <div class="form-group" style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px;">
                    <label style="margin: 0;">串口</label>
                    <select id="res-port" onchange="resPortChanged()" style="width: 100px; padding: 5px;">
                        <option value="">选择</option>
                    </select>
                    <button class="btn btn-primary" onclick="resToggleSerial()" id="btn-res-serial-connect" style="padding: 5px 10px;">连接</button>
                    <button class="btn btn-secondary" onclick="resRefreshPorts()" style="padding: 5px 10px;">刷新</button>
                    <span style="color: #718096;">|</span>
                    <span style="margin-left: 5px;">添加:</span>
                    <input type="text" id="res-device-name" placeholder="名称" style="width: 70px; padding: 5px;">
                    <input type="text" id="res-device-sn" placeholder="SN" style="width: 50px; padding: 5px;">
                    <button class="btn btn-primary" onclick="resAddDevice()" style="padding: 5px 10px;">添加</button>
                </div>

                <div class="divider"></div>

                <!-- 设备管理 -->
                <div class="section-title">
                    设备管理
                    <span style="font-weight: normal; font-size: 12px; text-transform: none; color: #718096; margin-left: 10px;">(点击选中，右键菜单)</span>
                </div>

                <!-- 批量控制按钮 -->
                <div class="btn-group" style="margin-bottom: 10px;">
                    <button class="btn btn-success" onclick="resDeviceAction('connect')" id="btn-res-device-connect">连接</button>
                    <button class="btn btn-danger" onclick="resDeviceAction('disconnect')" id="btn-res-device-disconnect">开路</button>
                    <button class="btn btn-warning" onclick="resDeviceAction('short')" id="btn-res-device-short">短路</button>
                    <button class="btn btn-secondary" onclick="resDeviceAction('unshort')" id="btn-res-device-unshort">取消短路</button>
                    <button class="btn btn-secondary" onclick="resSelectAll()">全选</button>
                    <button class="btn btn-secondary" onclick="resDeselectAll()">取消</button>
                    <button class="btn btn-danger" onclick="resDeleteSelected()">删除选中</button>
                </div>

                <!-- 设备列表 -->
                <div class="device-grid" id="device-grid">
                    <div class="loading" id="device-loading">暂无设备，请先连接串口并添加设备</div>
                </div>

                <!-- 设置日志 -->
                <div class="divider"></div>
                <div class="section-title">
                    设置日志
                    <button class="btn btn-secondary" onclick="clearResLog()" style="padding: 2px 8px; font-size: 11px; margin-left: 10px;">清除</button>
                </div>
                <div id="res-log" style="margin: 10px 0; padding: 10px; font-size: 12px; height: 120px; overflow-y: auto; text-align: left; background: #f7fafc; border-radius: 4px;">
                    <div style="color: #718096;">日志记录...</div>
                </div>
            </div>

            <!-- 示波器控制 -->
            <div class="card">
                <h2>示波器控制 <span id="scope-title-status"></span></h2>

                <div class="form-group">
                    <label>USB 序列号</label>
                    <div class="inline-form">
                        <input type="text" id="scope-serial" value="90Y701585" placeholder="USB 序列号" oninput="scopeSerialChanged()">
                    </div>
                    <div class="btn-group" style="margin-top: 10px;">
                        <button class="btn btn-primary" onclick="scopeToggleConnect()" id="btn-scope-connect" style="padding:8px 20px;font-size:14px;display:inline-flex;align-items:center;justify-content:center;height:38px;min-width:70px;">连接</button>
                        <button class="btn btn-secondary" onclick="scopeToggleLock()" id="btn-scope-lock" style="display:none;">锁定</button>
                        <button class="btn btn-secondary" onclick="scopeCopyScreenshot()" id="btn-scope-copy" style="display:none;">截图</button>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="section-title">
                    通道显示
                    <span style="margin-left: 20px; font-weight: normal;">
                        <label for="scope-interval" style="display: inline;">刷新周期:</label>
                        <input type="number" id="scope-interval" value="1000" min="500" max="10000" step="100"
                               onchange="scopeUpdateInterval()" style="width: 70px; padding: 3px 5px; font-size: 12px;"> ms
                    </span>
                </div>
                <div class="scope-channels">
                    <div class="scope-channel" id="scope-ch1" onclick="scopeToggleChannel(1)" style="cursor: pointer;">
                        <span class="ch-label" style="position:absolute;top:5px;left:10px;font-size:14px;font-weight:bold;color:#333;">CH1</span>
                        <span class="ch-value">--</span>
                    </div>
                    <div class="scope-channel" id="scope-ch2" onclick="scopeToggleChannel(2)" style="cursor: pointer;">
                        <span class="ch-label" style="position:absolute;top:5px;left:10px;font-size:14px;font-weight:bold;color:#333;">CH2</span>
                        <span class="ch-value">--</span>
                    </div>
                    <div class="scope-channel" id="scope-ch3" onclick="scopeToggleChannel(3)" style="cursor: pointer;">
                        <span class="ch-label" style="position:absolute;top:5px;left:10px;font-size:14px;font-weight:bold;color:#333;">CH3</span>
                        <span class="ch-value">--</span>
                    </div>
                    <div class="scope-channel" id="scope-ch4" onclick="scopeToggleChannel(4)" style="cursor: pointer;">
                        <span class="ch-label" style="position:absolute;top:5px;left:10px;font-size:14px;font-weight:bold;color:#333;">CH4</span>
                        <span class="ch-value">--</span>
                    </div>
                </div>
            </div>

            <!-- 电源控制 -->
            <div class="card">
                <h2>电源控制 <span id="power-title-status"></span></h2>

                <div class="form-group">
                    <label>VISA 资源</label>
                    <div class="inline-form">
                        <select id="power-address" onchange="powerAddressChanged()">
                            <option value="">请选择电源...</option>
                        </select>
                        <button class="btn btn-primary" onclick="powerToggleConnect()" id="btn-power-connect" style="padding:8px 20px;font-size:14px;display:inline-flex;align-items:center;justify-content:center;height:38px;min-width:70px;">连接</button>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="section-title">设置</div>
                <div class="inline-form">
                    <div class="form-group">
                        <label>电压 (V)</label>
                        <input type="number" id="power-voltage" step="0.1" value="13.5" style="width: 100px;">
                    </div>
                    <div class="form-group">
                        <label>电流 (A)</label>
                        <input type="number" id="power-current" step="0.1" value="20" style="width: 100px;">
                    </div>
                    <button class="btn btn-primary" onclick="powerSetParams()" style="padding:8px 20px;font-size:14px;display:inline-flex;align-items:center;justify-content:center;height:38px;min-width:70px;">设置</button>
                </div>

                <div class="divider"></div>

                <div class="section-title">输出控制</div>
                <div class="btn-group">
                    <button class="btn btn-success" onclick="powerSetOutput(true)">开启输出</button>
                    <button class="btn btn-danger" onclick="powerSetOutput(false)">关闭输出</button>
                </div>

                <div class="divider"></div>

                <div id="power-measure" class="value-display">-- V, -- A</div>
            </div>
        </div>
    </div>

    <!-- 右键菜单 -->
    <div class="context-menu" id="context-menu">
        <div class="context-menu-item" onclick="resRenameDeviceFromMenu()">重命名</div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" onclick="resDeleteDeviceFromMenu()">删除</div>
    </div>

    <!-- 重命名模态框 -->
    <div class="modal-overlay" id="rename-modal">
        <div class="modal">
            <h3>重命名设备</h3>
            <div class="form-group">
                <label>新名称</label>
                <input type="text" id="rename-input" placeholder="输入新名称">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeRenameModal()">取消</button>
                <button class="btn btn-primary" onclick="saveRename()">确定</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>
</html>
