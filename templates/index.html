<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            font-size: 1.3rem;
        }

        .card h2 #res-title-status,
        .card h2 #power-title-status,
        .card h2 #scope-title-status {
            display: none;
            float: right;
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: normal;
            background: #c6f6d5;
            color: #22543d;
        }

        .card h2 #res-title-status:not(:empty),
        .card h2 #power-title-status:not(:empty),
        .card h2 #scope-title-status:not(:empty) {
            display: inline-block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd6;
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover {
            background: #38a169;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .btn-warning {
            background: #ed8936;
            color: white;
        }

        .btn-warning:hover {
            background: #dd6b20;
        }

        .btn-secondary {
            background: #718096;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6d7a;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .value-display {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            padding: 20px;
            background: #f7fafc;
            border-radius: 8px;
            margin: 15px 0;
        }

        .channel-checkboxes {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .channel-checkboxes label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .channel-checkboxes input[type="checkbox"] {
            width: auto;
        }

        .scope-channels {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .scope-channel {
            background: #f7fafc;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .scope-channel::before {
            content: attr(data-channel);
            position: absolute;
            top: 5px;
            left: 10px;
            font-size: 16px;
            font-weight: bold;
            color: rgba(102, 126, 234, 0.3);
            pointer-events: none;
        }

        .scope-channel .ch-value {
            color: #667eea;
            font-weight: bold;
            font-size: 18px;
            position: relative;
            z-index: 1;
            margin-top: auto;
        }

        /* 不同通道的背景色 */
        .scope-channel[data-channel="CH1"]::before { color: rgba(102, 126, 234, 0.15); }
        .scope-channel[data-channel="CH2"]::before { color: rgba(72, 187, 120, 0.15); }
        .scope-channel[data-channel="CH3"]::before { color: rgba(237, 137, 54, 0.15); }
        .scope-channel[data-channel="CH4"]::before { color: rgba(245, 101, 101, 0.15); }

        .scope-unit {
            font-weight: normal;
            font-size: 12px;
            text-transform: none;
            color: #666;
            margin-left: 5px;
        }

        .inline-form {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .inline-form .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        .section-title {
            font-weight: 600;
            color: #333;
            margin: 20px 0 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .divider {
            height: 1px;
            background: #e2e8f0;
            margin: 15px 0;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #718096;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>控制面板</h1>

        <div class="grid">
            <!-- 电阻控制 -->
            <div class="card">
                <h2>电阻控制 <span id="res-title-status"></span></h2>

                <div class="form-group">
                    <label>串口选择</label>
                    <div class="inline-form">
                        <select id="res-port" onchange="resPortChanged()">
                            <option value="">请选择串口...</option>
                        </select>
                        <button class="btn btn-primary" onclick="resToggleConnect()" id="btn-res-connect">连接</button>
                        <button class="btn btn-secondary" onclick="resRefreshPorts()">刷新</button>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="section-title">电阻操作</div>
                <div class="btn-group">
                    <button class="btn btn-success" onclick="resAction('connect')" id="btn-res-connect">连接</button>
                    <button class="btn btn-danger" onclick="resAction('disconnect')" id="btn-res-disconnect">断开</button>
                    <button class="btn btn-warning" onclick="resAction('short')" id="btn-res-short">短路</button>
                    <button class="btn btn-secondary" onclick="resAction('unshort')" id="btn-res-unshort">取消短路</button>
                </div>

                <div class="divider"></div>

                <div class="section-title">设置电阻值</div>
                <div class="inline-form">
                    <div class="form-group">
                        <input type="number" id="res-value" placeholder="电阻值 (Ω)" min="0" max="7000000">
                    </div>
                    <button class="btn btn-primary" onclick="resSetValue()">设置</button>
                </div>

                <div class="divider"></div>

                <div class="section-title">按温度设置 (NTC)</div>
                <div class="inline-form">
                    <div class="form-group">
                        <input type="number" id="res-temperature" placeholder="温度 (°C)" min="-40" max="150" style="width: 120px;">
                    </div>
                    <button class="btn btn-primary" onclick="resSetByTemperature()">设置</button>
                </div>
            </div>

            <!-- 电源控制 -->
            <div class="card">
                <h2>电源控制 <span id="power-title-status"></span></h2>

                <div class="form-group">
                    <label>VISA 资源</label>
                    <div class="inline-form">
                        <select id="power-address" onchange="powerAddressChanged()">
                            <option value="">请选择电源...</option>
                        </select>
                        <button class="btn btn-primary" onclick="powerToggleConnect()" id="btn-power-connect">连接</button>
                        <button class="btn btn-secondary" onclick="powerRefreshResources()">刷新</button>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="section-title">设置参数</div>
                <div class="inline-form">
                    <div class="form-group">
                        <label>电压 (V)</label>
                        <input type="number" id="power-voltage" step="0.1" value="13.5" style="width: 100px;">
                    </div>
                    <div class="form-group">
                        <label>电流 (A)</label>
                        <input type="number" id="power-current" step="0.1" value="20" style="width: 100px;">
                    </div>
                    <button class="btn btn-primary" onclick="powerSetParams()">设置参数</button>
                </div>

                <div class="divider"></div>

                <div class="section-title">输出控制</div>
                <div class="btn-group">
                    <button class="btn btn-success" onclick="powerSetOutput(true)">开启输出</button>
                    <button class="btn btn-danger" onclick="powerSetOutput(false)">关闭输出</button>
                </div>

                <div class="divider"></div>

                <div id="power-measure" class="value-display">-- V, -- A</div>
            </div>

            <!-- 示波器控制 -->
            <div class="card">
                <h2>示波器控制 <span id="scope-title-status"></span></h2>

                <div class="form-group">
                    <label>USB 序列号</label>
                    <div class="inline-form">
                        <input type="text" id="scope-serial" value="90Y701585" placeholder="USB 序列号" oninput="scopeSerialChanged()">
                        <button class="btn btn-primary" onclick="scopeToggleConnect()" id="btn-scope-connect">连接</button>
                        <button class="btn btn-secondary" onclick="scopeToggleLock()" id="btn-scope-lock" style="display:none;">锁定</button>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="form-group">
                    <label>通道开关</label>
                    <div class="channel-checkboxes">
                        <label><input type="checkbox" id="scope-ch1-enable" value="1" onchange="scopeSetChannel(1)"> CH1</label>
                        <label><input type="checkbox" id="scope-ch2-enable" value="2" onchange="scopeSetChannel(2)"> CH2</label>
                        <label><input type="checkbox" id="scope-ch3-enable" value="3" onchange="scopeSetChannel(3)"> CH3</label>
                        <label><input type="checkbox" id="scope-ch4-enable" value="4" onchange="scopeSetChannel(4)"> CH4</label>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="section-title">
                    平均值显示
                    <span class="scope-unit">(mV/mA)</span>
                    <span style="margin-left: 20px; font-weight: normal;">
                        <label for="scope-interval" style="display: inline;">间隔:</label>
                        <input type="number" id="scope-interval" value="1000" min="500" max="10000" step="100"
                               onchange="scopeUpdateInterval()" style="width: 70px; padding: 3px 5px; font-size: 12px;"> ms
                    </span>
                </div>
                <div class="scope-channels">
                    <div class="scope-channel" id="scope-ch1" data-channel="CH1">
                        <span class="ch-value">--</span>
                    </div>
                    <div class="scope-channel" id="scope-ch2" data-channel="CH2">
                        <span class="ch-value">--</span>
                    </div>
                    <div class="scope-channel" id="scope-ch3" data-channel="CH3">
                        <span class="ch-value">--</span>
                    </div>
                    <div class="scope-channel" id="scope-ch4" data-channel="CH4">
                        <span class="ch-value">--</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scopeRefreshTimer = null;
        let powerRefreshTimer = null;
        let scopeConnected = false;
        let powerConnected = false;
        let resConnected = false;

        // 初始化
        window.onload = async function() {
            await Promise.all([
                resRefreshPorts(),
                powerRefreshResources()
            ]);
            updateDeviceStates();
        };

        // 更新设备连接状态
        async function updateDeviceStates() {
            try {
                const res = await fetch('/api/state');
                const data = await res.json();

                // 电阻
                if (data.resistance.connected) {
                    resConnected = true;
                    document.getElementById('res-port').value = data.resistance.port || '';
                    document.getElementById('res-port').disabled = true;
                    document.getElementById('btn-res-connect').textContent = '断开';
                    document.getElementById('btn-res-short').disabled = false;
                    document.getElementById('btn-res-unshort').disabled = false;
                    document.getElementById('res-title-status').textContent = '已连接';
                }

                // 电源
                if (data.power.connected) {
                    powerConnected = true;
                    document.getElementById('power-address').value = data.power.address || '';
                    document.getElementById('power-address').disabled = true;
                    document.getElementById('btn-power-connect').textContent = '断开';
                    document.getElementById('power-title-status').textContent = '已连接';
                    startPowerAutoRefresh();
                }

                // 示波器
                if (data.scope.connected) {
                    scopeConnected = true;
                    document.getElementById('scope-serial').value = data.scope.serial || '';
                    document.getElementById('scope-serial').disabled = true;
                    document.getElementById('btn-scope-connect').textContent = '断开';
                    document.getElementById('scope-title-status').textContent = '已连接';
                    // 显示锁定按钮
                    document.getElementById('btn-scope-lock').style.display = 'inline-block';
                    // 同步通道状态
                    scopeSyncChannelState();
                }

                if (data.scope.refresh_interval) {
                    document.getElementById('scope-interval').value = data.scope.refresh_interval;
                }
                // 默认开启自动刷新（如果示波器已连接）
                if (scopeConnected) {
                    startAutoRefresh();
                }
            } catch (e) {
                console.error('获取设备状态失败', e);
            }
        }

        // ===== 电阻控制 =====
        async function resRefreshPorts() {
            try {
                const res = await fetch('/api/res/list_ports');
                const data = await res.json();
                const select = document.getElementById('res-port');
                select.innerHTML = '<option value="">请选择串口...</option>';
                data.ports.forEach(port => {
                    select.innerHTML += `<option value="${port}">${port}</option>`;
                });
            } catch (e) {
                console.error('获取串口列表失败', e);
            }
        }

        async function resConnect() {
            const port = document.getElementById('res-port').value;
            if (!port) {
                return;
            }

            try {
                const res = await fetch('/api/res/connect', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({port: port})
                });
                const data = await res.json();
                if (data.success) {
                    resConnected = true;
                    document.getElementById('res-title-status').textContent = '已连接';
                    toggleResButtons(true);
                }
            } catch (e) {
                console.error('连接失败', e);
            }
        }

        async function resDisconnect() {
            try {
                const res = await fetch('/api/res/disconnect', {
                    method: 'POST'
                });
                const data = await res.json();
                if (data.success) {
                    resConnected = false;
                    document.getElementById('res-title-status').textContent = '';
                    toggleResButtons(false);
                }
            } catch (e) {
                console.error('断开失败', e);
            }
        }

        function resPortChanged() {
            // 切换串口时更新连接按钮状态
            const port = document.getElementById('res-port').value;
            document.getElementById('btn-res-connect').disabled = !port || resConnected;
        }

        async function resToggleConnect() {
            if (resConnected) {
                await resDisconnect();
            } else {
                await resConnect();
            }
        }

        function toggleResButtons(connected) {
            document.getElementById('btn-res-connect').textContent = connected ? '断开' : '连接';
            document.getElementById('res-port').disabled = connected;
            document.getElementById('btn-res-short').disabled = !connected;
            document.getElementById('btn-res-unshort').disabled = !connected;
        }

        async function resAction(action) {
            if (!resConnected) {
                return;
            }

            try {
                const res = await fetch('/api/res/action', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: action})
                });
            } catch (e) {
                console.error('操作失败', e);
            }
        }

        async function resSetValue() {
            if (!resConnected) {
                return;
            }

            const value = document.getElementById('res-value').value;
            if (!value) {
                return;
            }

            try {
                await fetch('/api/res/action', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'set_value', value: value})
                });
            } catch (e) {
                console.error('设置电阻值失败', e);
            }
        }

        async function resSetByTemperature() {
            if (!resConnected) {
                return;
            }

            const temperature = document.getElementById('res-temperature').value;
            if (!temperature) {
                return;
            }

            try {
                const res = await fetch('/api/res/set_by_temperature', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({temperature: parseFloat(temperature)})
                });
                const data = await res.json();
                if (data.success) {
                    // 更新电阻值显示
                    document.getElementById('res-value').value = data.resistance;
                }
            } catch (e) {
                console.error('按温度设置电阻失败', e);
            }
        }

        // ===== 电源控制 =====
        async function powerRefreshResources() {
            try {
                const res = await fetch('/api/power/list_resources');
                const data = await res.json();
                const select = document.getElementById('power-address');
                select.innerHTML = '<option value="">请选择电源...</option>';
                data.resources.forEach(r => {
                    select.innerHTML += `<option value="${r}">${r}</option>`;
                });
            } catch (e) {
                console.error('获取资源列表失败', e);
            }
        }

        async function powerConnect() {
            const address = document.getElementById('power-address').value;
            if (!address) {
                return;
            }

            try {
                const res = await fetch('/api/power/connect', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({address: address})
                });
                const data = await res.json();
                if (data.success) {
                    powerConnected = true;
                    document.getElementById('power-title-status').textContent = '已连接';
                    togglePowerButtons(true);
                    startPowerAutoRefresh();
                }
            } catch (e) {
                console.error('连接失败', e);
            }
        }

        async function powerDisconnect() {
            try {
                const res = await fetch('/api/power/disconnect', {
                    method: 'POST'
                });
                const data = await res.json();
                if (data.success) {
                    powerConnected = false;
                    document.getElementById('power-title-status').textContent = '';
                    togglePowerButtons(false);
                    stopPowerAutoRefresh();
                }
            } catch (e) {
                console.error('断开失败', e);
            }
        }

        function powerAddressChanged() {
            const address = document.getElementById('power-address').value;
            document.getElementById('btn-power-connect').disabled = !address || powerConnected;
        }

        async function powerToggleConnect() {
            if (powerConnected) {
                await powerDisconnect();
            } else {
                await powerConnect();
            }
        }

        function togglePowerButtons(connected) {
            document.getElementById('btn-power-connect').textContent = connected ? '断开' : '连接';
            document.getElementById('power-address').disabled = connected;
        }

        async function powerSetParams() {
            if (!powerConnected) {
                return;
            }

            const voltage = document.getElementById('power-voltage').value;
            const current = document.getElementById('power-current').value;

            try {
                const body = {};
                if (voltage) body.voltage = parseFloat(voltage);
                if (current) body.current = parseFloat(current);

                await fetch('/api/power/set', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
            } catch (e) {
                console.error('设置参数失败', e);
            }
        }

        async function powerSetOutput(on) {
            if (!powerConnected) {
                return;
            }

            try {
                await fetch('/api/power/set', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({output: on})
                });
            } catch (e) {
                console.error('设置输出失败', e);
            }
        }

        async function powerMeasure() {
            if (!powerConnected) {
                return;
            }

            try {
                const res = await fetch('/api/power/measure');
                const data = await res.json();
                if (!data.error) {
                    document.getElementById('power-measure').textContent =
                        `${data.voltage.toFixed(4)} V, ${data.current.toFixed(4)} A`;
                }
            } catch (e) {
                console.error('测量失败', e);
            }
        }

        function startPowerAutoRefresh() {
            stopPowerAutoRefresh();
            powerRefreshTimer = setInterval(powerMeasure, 1000);
        }

        function stopPowerAutoRefresh() {
            if (powerRefreshTimer) {
                clearInterval(powerRefreshTimer);
                powerRefreshTimer = null;
            }
        }

        // ===== 示波器控制 =====
        async function scopeConnect() {
            const serial = document.getElementById('scope-serial').value;
            if (!serial) {
                return;
            }

            try {
                const res = await fetch('/api/scope/connect', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({serial: serial})
                });
                const data = await res.json();
                if (data.success) {
                    scopeConnected = true;
                    document.getElementById('scope-title-status').textContent = '已连接';
                    toggleScopeButtons(true);
                    // 获取通道状态并同步复选框
                    scopeSyncChannelState();
                    // 启动自动刷新
                    startAutoRefresh();
                }
            } catch (e) {
                console.error('连接失败', e);
            }
        }

        async function scopeDisconnect() {
            try {
                const res = await fetch('/api/scope/disconnect', {
                    method: 'POST'
                });
                const data = await res.json();
                if (data.success) {
                    scopeConnected = false;
                    document.getElementById('scope-title-status').textContent = '';
                    stopAutoRefresh();
                    toggleScopeButtons(false);
                }
            } catch (e) {
                console.error('断开失败', e);
            }
        }

        function scopeSerialChanged() {
            const serial = document.getElementById('scope-serial').value;
            document.getElementById('btn-scope-connect').disabled = !serial || scopeConnected;
        }

        async function scopeToggleConnect() {
            if (scopeConnected) {
                await scopeDisconnect();
            } else {
                await scopeConnect();
            }
        }

        function toggleScopeButtons(connected) {
            document.getElementById('btn-scope-connect').textContent = connected ? '断开' : '连接';
            document.getElementById('scope-serial').disabled = connected;
            document.getElementById('btn-scope-lock').style.display = connected ? 'inline-block' : 'none';
        }

        let scopeLocked = true;  // 远程模式为锁定

        async function scopeToggleLock() {
            try {
                const url = scopeLocked ? '/api/scope/unlock' : '/api/scope/lock';
                const res = await fetch(url, {
                    method: 'POST'
                });
                const data = await res.json();
                if (data.success) {
                    scopeLocked = !scopeLocked;
                    document.getElementById('btn-scope-lock').textContent = scopeLocked ? '解锁' : '锁定';
                }
            } catch (e) {
                console.error('操作失败', e);
            }
        }

        function scopeUpdateInterval() {
            // 重新设置刷新定时器
            startAutoRefresh();
        }

        async function scopeSyncChannelState() {
            if (!scopeConnected) {
                return;
            }

            try {
                const res = await fetch('/api/scope/channel_state');
                const data = await res.json();
                if (data.channels) {
                    for (let i = 1; i <= 4; i++) {
                        const checkbox = document.getElementById(`scope-ch${i}-enable`);
                        if (checkbox && data.channels[`ch${i}`] !== undefined) {
                            checkbox.checked = data.channels[`ch${i}`];
                        }
                    }
                }
            } catch (e) {
                console.error('获取通道状态失败', e);
            }
        }

        async function scopeSetChannel(channel) {
            if (!scopeConnected) {
                return;
            }

            const checkbox = document.getElementById(`scope-ch${channel}-enable`);
            if (!checkbox) {
                return;
            }

            const enable = checkbox.checked;

            try {
                await fetch('/api/scope/channel', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({channel: channel, enable: enable})
                });
            } catch (e) {
                console.error('设置通道开关失败', e);
            }
        }

        async function scopeGetMean() {
            if (!scopeConnected) {
                return;
            }

            try {
                const res = await fetch('/api/scope/get_mean');
                const data = await res.json();
                if (!data.error && data.channels) {
                    const channels = data.channels;
                    for (let i = 1; i <= 4; i++) {
                        const chKey = 'ch' + i;
                        const val = channels[chKey];
                        const el = document.querySelector(`#scope-ch${i} .ch-value`);
                        // 只更新有效值，null、undefined 或 NaN 时显示 --
                        if (el && val !== undefined && val !== null && !isNaN(val)) {
                            el.textContent = `${val.toFixed(3)}`;
                        } else if (el) {
                            el.textContent = '--';
                        }
                    }
                }
            } catch (e) {
                // 读取失败时不显示错误，数值保持不变
            }
        }

        function startAutoRefresh() {
            stopAutoRefresh();
            const interval = parseInt(document.getElementById('scope-interval').value) || 1000;
            scopeRefreshTimer = setInterval(scopeGetMean, interval);
        }

        function stopAutoRefresh() {
            if (scopeRefreshTimer) {
                clearInterval(scopeRefreshTimer);
                scopeRefreshTimer = null;
            }
        }
    </script>
</body>
</html>
